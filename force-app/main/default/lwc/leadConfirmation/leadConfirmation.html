<template>
  <template if:false={hasLead}>
    <div
      class="slds-box slds-text-align_center slds-var-p-around_medium slds-var-m-top_small"
    >
      <p class="slds-text-color_weak">Something went wrong</p>
    </div>
  </template>

  <template if:true={hasLead}>
    <section class="slds-card slds-p-around_medium container">
      <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
          <div class="slds-media slds-media_center">
            <div class="slds-media__figure">
              <lightning-icon
                icon-name={statusIcon}
                alternative-text={lead.status}
                variant={statusVariant}
                size="large"
              ></lightning-icon>
            </div>
            <div class="slds-media__body">
              <h2 class="slds-text-heading_small slds-m-bottom_x-small">
                Lead Booked Successfully
              </h2>
              <p class="slds-text-body_regular slds-text-color_weak">
                Your lead has been successfully submitted
              </p>
            </div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-1">
          <div class="confirmation-box">
            <div class="slds-grid slds-wrap">
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                <div class="confirmation-code">
                  <span class="slds-text-body_small slds-text-color_weak"
                    >Lead ID</span
                  >
                  <p class="slds-text-heading_medium slds-text-color_default">
                    {lead.leadId}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
          <dl class="slds-dl_horizontal">
            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Name</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{fullName}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Email</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{lead.email}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Phone</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{lead.phone}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Company</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{lead.companyName}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Title</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{lead.title}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Country</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <p class="slds-text-body_regular">{lead.country}</p>
            </dd>

            <dt class="slds-dl_horizontal__label">
              <p class="slds-text-body_small slds-text-color_weak">Status</p>
            </dt>
            <dd class="slds-dl_horizontal__detail slds-tile__meta">
              <lightning-badge
                label={lead.status}
                class="status-badge"
              ></lightning-badge>
            </dd>
          </dl>
        </div>
      </div>
    </section>
  </template>
</template>
